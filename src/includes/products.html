<!-- Products section placeholder -->
<section class="product-category-section" aria-labelledby="product-category-heading">
    <div class="container">
  
      <!-- Tabs -->
      <div class="product-category-tabs" role="tablist">
        <button class="product-category-tab active" role="tab" aria-selected="true" data-filter="new-arrival">
          New Arrival
        </button>
        <button class="product-category-tab" role="tab" aria-selected="false" data-filter="bestseller">
          Bestseller
        </button>
        <button class="product-category-tab" role="tab" aria-selected="false" data-filter="featured-products">
          Featured Products
        </button>
      </div>
  
      <!-- Product Grid -->
      <div class="product-category-grid">
  
        <!-- Product Card -->
        <article class="product-category-card" data-category="new-arrival">
          <button class="product-category-fav-btn" aria-label="Add to wishlist">
            ♡
          </button>
  
          <img src="images/iphone.png" alt="Apple iPhone 14 Pro Max Deep Purple"
            class="product-category-image" loading="lazy">
  
          <h3 class="product-category-title">
            Apple iPhone 14 Pro Max 128GB Deep Purple
          </h3>
  
          <p class="product-category-price">$900</p>
  
          <button class="product-category-buy-btn">
            Buy Now
          </button>
        </article>
  
        <!-- Product -->
        <article class="product-category-card" data-category="featured-products">
          <button class="product-category-fav-btn" aria-label="Add to wishlist">♡</button>
          <img src="images/camera.png" alt="Blackmagic Pocket Cinema Camera 6K"
            class="product-category-image" loading="lazy">
          <h3 class="product-category-title">Blackmagic Pocket Cinema Camera 6K</h3>
          <p class="product-category-price">$2535</p>
          <button class="product-category-buy-btn">Buy Now</button>
        </article>
  
        <!-- Product -->
        <article class="product-category-card" data-category="new-arrival">
          <button class="product-category-fav-btn" aria-label="Add to wishlist">♡</button>
          <img src="images/watch.png" alt="Apple Watch Series 9 GPS 41mm"
            class="product-category-image" loading="lazy">
          <h3 class="product-category-title">Apple Watch Series 9 GPS 41mm</h3>
          <p class="product-category-price">$399</p>
          <button class="product-category-buy-btn">Buy Now</button>
        </article>
  
        <!-- Product -->
        <article class="product-category-card" data-category="bestseller">
          <button class="product-category-fav-btn" aria-label="Add to wishlist">♡</button>
          <img src="images/airpods.png" alt="AirPods Max Silver"
            class="product-category-image" loading="lazy">
          <h3 class="product-category-title">AirPods Max Silver</h3>
          <p class="product-category-price">$549</p>
          <button class="product-category-buy-btn">Buy Now</button>
        </article>
  
        <!-- Product -->
        <article class="product-category-card" data-category="featured-products">
          <button class="product-category-fav-btn" aria-label="Add to wishlist">♡</button>
          <img src="images/samsung-watch.png" alt="Samsung Galaxy Watch6 Classic"
            class="product-category-image" loading="lazy">
          <h3 class="product-category-title">Samsung Galaxy Watch6 Classic</h3>
          <p class="product-category-price">$369</p>
          <button class="product-category-buy-btn">Buy Now</button>
        </article>
  
        <!-- Product -->
        <article class="product-category-card" data-category="new-arrival">
          <button class="product-category-fav-btn active" aria-label="Remove from wishlist">❤</button>
          <img src="images/zfold.png" alt="Galaxy Z Fold5 Phantom Black"
            class="product-category-image" loading="lazy">
          <h3 class="product-category-title">Galaxy Z Fold5 Unlocked</h3>
          <p class="product-category-price">$1799</p>
          <button class="product-category-buy-btn">Buy Now</button>
        </article>
  
        <!-- Product -->
        <article class="product-category-card" data-category="bestseller">
          <button class="product-category-fav-btn" aria-label="Add to wishlist">♡</button>
          <img src="images/buds.png" alt="Galaxy Buds FE Graphite"
            class="product-category-image" loading="lazy">
          <h3 class="product-category-title">Galaxy Buds FE</h3>
          <p class="product-category-price">$99.99</p>
          <button class="product-category-buy-btn">Buy Now</button>
        </article>
  
        <!-- Product -->
        <article class="product-category-card" data-category="new-arrival">
          <button class="product-category-fav-btn" aria-label="Add to wishlist">♡</button>
          <img src="images/ipad.png" alt="Apple iPad 10.2 2021"
            class="product-category-image" loading="lazy">
          <h3 class="product-category-title">Apple iPad 10.2” 64GB</h3>
          <p class="product-category-price">$398</p>
          <button class="product-category-buy-btn">Buy Now</button>
        </article>
  
      </div>
    </div>
  </section>
