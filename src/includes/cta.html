<section class="cta-banner" aria-labelledby="cta-banner-title">

  <!-- Decorative images (left) -->
  <div class="cta-banner__media cta-banner__media--left" aria-hidden="true">
    
    <picture>
      <source media="(max-width: 768px)" srcset="images/tablet-mobile.webp">
      <source media="(min-width: 769px)" srcset="images/tablet-desktop.webp">
      <img src="images/tablet-desktop.png" alt="" loading="lazy" />
    </picture>

    <picture>
      <source media="(max-width: 768px)" srcset="images/phone-mobile.webp">
      <source media="(min-width: 769px)" srcset="images/phone-desktop.webp">
      <img src="images/phone-desktop.png" alt="" loading="lazy" />
    </picture>

  </div>

  <!-- Content -->
  <div class="cta-banner__content">
    <h2 id="cta-banner-title" class="cta-banner__title">
      Big Summer <span>Sale</span>
    </h2>

    <p class="cta-banner__text">
      Discover great deals on the latest tech. Limited-time offers available now.
    </p>

    <a href="#shop" class="cta-banner__button" aria-label="Shop summer sale">
      Shop Now
    </a>
  </div>

  <!-- Decorative images (right) -->
  <div class="cta-banner__media cta-banner__media--right" aria-hidden="true">

    <picture>
      <source media="(max-width: 768px)" srcset="images/watch-mobile.webp">
      <source media="(min-width: 769px)" srcset="images/watch-desktop.webp">
      <img src="images/watch-desktop.png" alt="" loading="lazy" />
    </picture>

    <picture>
      <source media="(max-width: 768px)" srcset="images/phone2-mobile.webp">
      <source media="(min-width: 769px)" srcset="images/phone2-desktop.webp">
      <img src="images/phone2-desktop.png" alt="" loading="lazy" />
    </picture>

  </div>

</section>
