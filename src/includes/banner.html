<section class="hero" role="region" aria-labelledby="hero-heading">
    <div class="container">
      <div class="hero__content">
        <p class="hero__tagline">Pro.Beyond.</p>

        <h1 id="hero-heading" class="hero__title">
          IPhone 14 <span>Pro</span>
        </h1>

        <p class="hero__description">
          Created to change everything for the better. For everyone
        </p>

        <a
          href="#"
          class="white-btn"
          role="button"
          aria-label="Shop iPhone 14 Pro now"
        >
          Shop Now
        </a>
      </div>

      <div class="hero__image">
        <picture>
          <!-- desktop -->
          <source
            srcset="uploads/iphonee.png"
            media="(min-width: 768px)"
            type="image/png"
          />


         <!-- mobile -->
          <source srcset="uploads/banner-mob.png" type="image/png" />

          <img
            src="uploads/iphonee.png"
            alt="iPhone 14 Pro front and back view"
            width="406"
            height="632"
            loading="eager"
            fetchpriority="high"
          />
        </picture>
      </div>
    </div>
  </section>
