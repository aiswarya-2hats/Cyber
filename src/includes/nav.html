


<form class="search" role="search">
    <span class="icon icon-Vector11 search-icon" aria-hidden="true"></span>
    <input
      id="search-input"
      type="search"
      placeholder="Search"
      aria-label="Search"
      maxlength="80"
    />
  </form>

  <!-- Navigation -->
  <nav class="nav" aria-label="Main navigation">
    <ul>
      <li><a href="#" data-nav-item="home" aria-current="page">Home</a></li>

      aria-label="Toggle search"
      aria-expanded="false"

      <span class="icon icon-Vector11"></span>
    </button>
    <button aria-label="Wishlist"><span class="icon icon-Vector10"></span></button>
